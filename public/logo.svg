<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Table top -->
  <rect x="40" y="50" width="120" height="16" rx="8" fill="#2DD4BF"/>
  <!-- Table shadow on top -->
  <rect x="40" y="50" width="120" height="8" rx="4" fill="#14B8A6" opacity="0.3"/>
  <!-- Table legs -->
  <rect x="55" y="66" width="8" height="40" rx="2" fill="#1a2b3c"/>
  <rect x="137" y="66" width="8" height="40" rx="2" fill="#1a2b3c"/>
  <!-- Shadow under table -->
  <ellipse cx="100" cy="112" rx="40" ry="6" fill="#2DD4BF" opacity="0.15"/>
  <!-- "Tble" text -->
  <text x="100" y="148" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="42" fill="#1a2b3c">Tble</text>
  <!-- "LET'S TABLE IT" tagline -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" letter-spacing="2" fill="#2DD4BF">LET'S TABLE IT</text>
</svg>
